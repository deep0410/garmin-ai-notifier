name: garmin-daily

on:
  schedule:
    # 17:00 UTC ≈ 1:00 PM US Eastern (EDT); ≈ 12:00 PM in EST (winter)
    - cron: "48 17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Restore Garmin token
        env:
          GARMIN_TOKENS_B64: ${{ secrets.GARMIN_TOKENS_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.garminconnect
          if [ -z "${GARMIN_TOKENS_B64}" ]; then
            echo "GARMIN_TOKENS_B64 secret is empty" >&2
            exit 1
          fi
          printf '%s' "$GARMIN_TOKENS_B64" | tr -d '\n\r\t ' | base64 -d > tokens.tar
          tar -tf tokens.tar >/dev/null
          tar -xf tokens.tar -C ~/.garminconnect
          rm -f tokens.tar
          if [ ! -f ~/.garminconnect/garmin_tokens.json ]; then
            echo "Token file missing after extract — re-run scripts/pack_tokens.sh locally" >&2
            ls -la ~/.garminconnect >&2 || true
            exit 1
          fi

      - name: Run daily brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python -m src.main

      - name: Persist data
        run: |
          git config user.name "garmin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add garmin.db
          git commit -m "data $(date -I)" || echo "no changes"
          git push
