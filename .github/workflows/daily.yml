# Triggered by workflow_dispatch only (manual or external cron).
# Do not use GitHub's on.schedule — it is unreliable. See README: crontab.guru + cron-job.org.
#
# Garmin auth: GitHub OIDC → AWS IAM role → Secrets Manager (garmin-ai-notifier/garmin-tokens).
# Tokens are restored before the run and persisted after (even on failure) so refresh-token
# rotation self-heals. Only garmin.db is committed. See README setup steps 4–6.

name: garmin-daily

on:
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: us-east-1
  GARMIN_TOKEN_SECRET_NAME: garmin-ai-notifier/garmin-tokens

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Restore Garmin token from AWS
        run: bash scripts/token_aws.sh restore

      - name: Run daily brief
        id: daily
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python -m src.main

      - name: Persist rotated Garmin token to AWS
        if: always() && steps.daily.conclusion != 'cancelled'
        run: bash scripts/token_aws.sh persist

      - name: Persist data
        if: steps.daily.outcome == 'success'
        run: |
          git config user.name "garmin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add garmin.db
          git commit -m "data $(date -I)" || echo "no changes"
          git push
